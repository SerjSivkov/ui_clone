name: ui_clone
description: >-
  UI Clone — захват экрана целевого приложения (скриншоты / запись),
  AI-анализ интерфейса и генерация промпта для клонирования UI.
publish_to: 'none'
version: 1.0.0+4

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  share_plus: ^10.1.4
  google_fonts: ^6.2.1
  collection: ^1.19.1
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  image: ^4.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/app_icon.png
  # No adaptive_icon_* — adaptive masks crop the outer safe-zone.


flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/legal/terms_of_use.txt
    - LICENSE
